<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Игра</title>
<style>
  body {
    font-family: sans-serif;
    background-color: #f0f8ff;
    margin: 0;
    padding: 20px;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    box-sizing: border-box;
  }
  .container {
    background: white;
    max-width: 600px;
    width: 90%;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    text-align: center;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  h1.game-title {
    margin: 0 0 15px;
  }
  .progress-container {
    position: relative;
    height: 25px;
    border-radius: 10px;
    background-color: #e0e0e0;
    margin-bottom: 20px;
  }
  .progress-bar {
    height: 100%;
    background-color: #007bff;
    border-radius: inherit;
    width: 0;
    transition: width 0.5s ease-in-out;
  }
  .progress-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-weight: 700;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }
  #game-image {
    max-width: 100%;
    max-height: 150px;
    border-radius: 8px;
    margin-bottom: 20px;
    object-fit: contain;
    height: auto;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  .definition {
    font-size: 1.2em;
    margin-bottom: 20px;
    background-color: #ffffff;
    padding: 10px;
    border-radius: 8px;
    min-height: 50px;
  }
  #feedback {
    margin-top: 20px;
    font-size: 1.1em;
    font-weight: 700;
    min-height: 1.5em;
    color: #28a745; /* зеленый для успеха */
  }
  #feedback.error {
    color: #dc3545; /* красный для ошибки */
  }
  .button {
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    padding: 12px 24px;
    margin: 5px;
    user-select: none;
    color: white;
    transition: background-color 0.3s ease;
  }
  #check-btn {
    background-color: #007bff;
  }
  #check-btn:hover {
    background-color: #0056b3;
  }
  #clear-btn {
    background-color: #ffc107;
    color: #333;
  }
  #clear-btn:hover {
    background-color: #e0a800;
  }
  .answer-display {
    background: #eee;
    border-radius: 8px;
    padding: 15px;
    min-height: 50px;
    margin: 20px 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 10px;
    border: 2px dashed #ccc;
  }
  .letter-pool {
    margin: 20px 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }
  .letter-btn {
    font-size: 1.5em;
    width: 50px;
    height: 50px;
    border: none;
    border-radius: 6px;
    background-color: #007bff;
    color: white;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.2s ease;
    font-weight: 600;
    user-select: none;
  }
  .letter-btn:hover {
    background-color: #0056b3;
    transform: scale(1.1);
  }
  .letter-btn.placed {
    background-color: #6c757d;
    cursor: default;
  }
  .letter-btn.error {
    background-color: #dc3545 !important;
    animation: shake 0.5s;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-5px); }
    40%,80% { transform: translateX(5px); }
  }
  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
</style>
</head>
<body>
  <div class="container">
    <h1 class="game-title">Интерактивная Викторина</h1>
    <div class="progress-container">
      <div class="progress-bar"></div>
      <div class="progress-text">0 / 3</div>
    </div>
    <img id="game-image" src="" alt="Изображение вопроса" />
    <p class="definition"></p>

    <div class="answer-display" aria-label="Ответ"></div>
    <div class="letter-pool" aria-label="Буквы"></div>

    <div class="controls">
      <button id="check-btn" class="button" type="button">Проверить</button>
      <button id="clear-btn" class="button" type="button">Сброс</button>
    </div>

    <p id="feedback" aria-live="polite"></p>
  </div>

<script>
  (function(){
    // Вопросы, ответы, картинки
    const gameData = [
      {definition:"Самая большая планета Солнечной системы", answer:"Юпитер", imageUrl:"https://i.ibb.co/L8y2hQZ/jupiter.png"},
      {definition:"Столица Японии", answer:"Токио", imageUrl:"https://i.ibb.co/Wc6YpQ8/tokyo.jpg"},
      {definition:"Процесс превращения воды в пар", answer:"Испарение", imageUrl:""}
    ];

    let currentQuestionIndex = 0;

    // Элементы UI
    const elements = {
      progressBar: document.querySelector('.progress-bar'),
      progressText: document.querySelector('.progress-text'),
      gameImage: document.getElementById('game-image'),
      definition: document.querySelector('.definition'),
      answerDisplay: document.querySelector('.answer-display'),
      letterPool: document.querySelector('.letter-pool'),
      feedback: document.getElementById('feedback'),
      btnCheck: document.getElementById('check-btn'),
      btnClear: document.getElementById('clear-btn'),
    };

    function shuffle(arr){
      return arr.sort(() => Math.random() - 0.5);
    }

    function updateProgress(){
      elements.progressText.textContent = `${currentQuestionIndex} / ${gameData.length}`;
      const widthPercent = (currentQuestionIndex / gameData.length) * 100;
      elements.progressBar.style.width = widthPercent + '%';
    }

    function loadQuestion(){
      updateProgress();
      elements.feedback.textContent = '';
      elements.feedback.classList.remove('error');
      elements.answerDisplay.innerHTML = '';
      elements.letterPool.innerHTML = '';

      if(currentQuestionIndex >= gameData.length){
        elements.definition.textContent = "Игра окончена! Вы молодец!";
        elements.gameImage.style.display = 'none';
        elements.btnCheck.disabled = true;
        elements.btnClear.disabled = true;
        return;
      }

      const question = gameData[currentQuestionIndex];
      elements.definition.textContent = question.definition;

      if(question.imageUrl){
        elements.gameImage.src = question.imageUrl;
        elements.gameImage.style.display = 'block';
      } else {
        elements.gameImage.style.display = 'none';
      }

      // Создаем буквы в случайном порядке
      const letters = shuffle(question.answer.replace(/\s/g, '').toUpperCase().split(''));
      for(const letter of letters){
        const btn = document.createElement('button');
        btn.className = 'button letter-btn';
        btn.textContent = letter;
        btn.type = 'button';
        btn.addEventListener('click', () => {
          if(!btn.classList.contains('placed')){
            btn.classList.add('placed');
            const answerLetter = document.createElement('button');
            answerLetter.textContent = letter;
            answerLetter.className = 'button letter-btn';
            answerLetter.disabled = true; // чтоб нельзя было нажать
            elements.answerDisplay.appendChild(answerLetter);
          }
        });
        elements.letterPool.appendChild(btn);
      }
    }

    elements.btnClear.addEventListener('click', () => {
      elements.answerDisplay.innerHTML = '';
      for(const btn of elements.letterPool.querySelectorAll('button')){
        btn.classList.remove('placed');
      }
      elements.feedback.textContent = '';
      elements.feedback.classList.remove('error');
    });

    elements.btnCheck.addEventListener('click', () => {
      const userAnswer = Array.from(elements.answerDisplay.children).map(btn => btn.textContent).join('');
      const correctAnswer = gameData[currentQuestionIndex].answer.replace(/\s/g, '').toUpperCase();

      if(userAnswer === correctAnswer){
        elements.feedback.textContent = "Верно! Отлично!";
        elements.feedback.classList.remove('error');
        currentQuestionIndex++;
        setTimeout(loadQuestion, 1500);
      } else {
        elements.feedback.textContent = "Ошибка, попробуй еще раз.";
        elements.feedback.classList.add('error');
      }
    });

    // Загрузка первой задачи при загрузке страницы
    loadQuestion();

  })();
</script>
</body>
</html>
